{% extends "base.html" %}
{% block title %}Add Item — GraceSupply{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Add Item</h1>
  <a href="{{ url_for('main.items') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="card">
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label for="name">Item Name *</label>
      <input type="text" id="name" name="name" required placeholder="e.g. Trash bags 33 gal">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="unit">Unit</label>
        <input type="text" id="unit" name="unit" value="each" placeholder="each, box, case, roll…">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="current_quantity">Current Quantity</label>
        <input type="number" id="current_quantity" name="current_quantity" value="0" min="0">
      </div>

      <div class="form-group">
        <label for="minimum_quantity">Minimum Quantity (reorder point)</label>
        <input type="number" id="minimum_quantity" name="minimum_quantity" value="0" min="0">
      </div>
    </div>

    <div class="form-group">
      <label for="target_quantity">Target Quantity (restock to — optional)</label>
      <input type="number" id="target_quantity" name="target_quantity" min="0" placeholder="Leave blank to skip">
    </div>

    <div class="form-group">
      <label for="location">Storage Location</label>
      <input type="text" id="location" name="location" placeholder="e.g. Storage room B, shelf 2">
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" placeholder="Brand preferences, anything useful…"></textarea>
    </div>

    <h2 style="margin-top:1.25rem;">Ordering Info <span class="meta" style="font-weight:400;">(optional)</span></h2>

    <div class="grid-2">
      <div class="form-group">
        <label for="vendor">Vendor</label>
        <input type="text" id="vendor" name="vendor" placeholder="Sam's Club, Amazon, etc.">
      </div>
      <div class="form-group">
        <label for="sku">Product code / SKU</label>
        <input type="text" id="sku" name="sku" placeholder="Item # or product code">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="vendor_url">Order link (URL)</label>
        <input type="text" id="vendor_url" name="vendor_url" placeholder="https://…">
      </div>
      <div class="form-group">
        <label for="estimated_unit_cost">Unit cost ($)</label>
        <input type="number" id="estimated_unit_cost" name="estimated_unit_cost" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>

    <div class="form-group">
      <label for="photo">Product Photo (optional)</label>
      <input type="file" id="photo" name="photo" accept=".jpg,.jpeg,.png,.webp" style="padding:.4rem 0;">
      <div class="meta" style="margin-top:.25rem;">jpg, jpeg, png, or webp · max 5 MB</div>
    </div>

    <button type="submit" class="btn btn-primary">Save Item</button>
  </form>
</div>
{% endblock %}
