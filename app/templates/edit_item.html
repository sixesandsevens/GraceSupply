{% extends "base.html" %}
{% block title %}Edit {{ item.name }} — GraceSupply{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Item</h1>
  <a href="{{ url_for('main.item_detail', item_id=item.id) }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="card">
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label for="name">Item Name *</label>
      <input type="text" id="name" name="name" required value="{{ item.name }}">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          {% for cat in categories %}
            <option value="{{ cat }}" {% if item.category == cat %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="unit">Unit</label>
        <input type="text" id="unit" name="unit" value="{{ item.unit }}">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="minimum_quantity">Minimum Quantity (reorder point)</label>
        <input type="number" id="minimum_quantity" name="minimum_quantity" value="{{ item.minimum_quantity }}" min="0">
      </div>
      <div class="form-group">
        <label for="target_quantity">Target Quantity (restock to)</label>
        <input type="number" id="target_quantity" name="target_quantity" value="{{ item.target_quantity or '' }}" min="0" placeholder="Optional">
      </div>
    </div>

    <div class="form-group">
      <label for="location">Storage Location</label>
      <input type="text" id="location" name="location" value="{{ item.location or '' }}">
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes">{{ item.notes or '' }}</textarea>
    </div>

    <div class="form-group">
      <label>Product Photo</label>
      {% if item.image_filename %}
        <div style="margin-bottom:.75rem;">
          <img src="{{ url_for('static', filename='uploads/items/' + item.image_filename) }}"
               alt="{{ item.name }}"
               style="max-height:160px;border-radius:6px;border:1px solid #e7e5e4;">
        </div>
        <label style="display:flex;align-items:center;gap:.4rem;font-weight:400;color:#44403c;cursor:pointer;margin-bottom:.5rem;">
          <input type="checkbox" name="remove_photo" value="1"> Remove current photo
        </label>
        <div class="meta" style="margin-bottom:.4rem;">Or upload a replacement:</div>
      {% endif %}
      <input type="file" id="photo" name="photo" accept=".jpg,.jpeg,.png,.webp" style="padding:.4rem 0;">
      <div class="meta" style="margin-top:.25rem;">jpg, jpeg, png, or webp · max 5 MB</div>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
